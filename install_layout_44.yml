---
- name: Install Nova XKB layout
  hosts: localhost

  tasks:
    - name: Install nova symbols file
      ansible.builtin.copy:
        src: files/us-nova
        dest: "{{ ansible_facts.env.HOME }}/.config/xkb/symbols/us-nova"
        mode: "0644"

    - name: Get current input sources
      ansible.builtin.command:
        cmd: gsettings get org.gnome.desktop.input-sources sources
      register: current_sources
      changed_when: false

    - name: Set GNOME input sources to Nova layout
      ansible.builtin.command:
        cmd: >
          gsettings set org.gnome.desktop.input-sources sources "[('xkb', 'us-nova')]"
      when: "'us-nova' not in current_sources.stdout"
      changed_when: true
    - name: Verify Nova layout is active
      ansible.builtin.command:
        cmd: gsettings get org.gnome.desktop.input-sources sources
      register: gsettings_sources
      changed_when: false
      failed_when: "'us-nova' not in gsettings_sources.stdout"
    - name: Ensure both Shifts toggle Caps Lock
      block:
        - name: Read current XKB options
          ansible.builtin.command:
            cmd: gsettings get org.gnome.desktop.input-sources xkb-options
          register: current_xkb_options
          changed_when: false

        - name: Verify both-shift Caps option is already set
          ansible.builtin.fail:
            msg: "shift:both_capslock is not set"
          when: "'shift:both_capslock' not in current_xkb_options.stdout"

      rescue:
        - name: Set both-shift Caps option
          ansible.builtin.command:
            cmd: >
              gsettings set org.gnome.desktop.input-sources xkb-options "['shift:both_capslock']"

        - name: Read XKB options after setting
          ansible.builtin.command:
            cmd: gsettings get org.gnome.desktop.input-sources xkb-options
          register: updated_xkb_options
          changed_when: false

        - name: Verify both-shift Caps option is now set
          ansible.builtin.fail:
            msg: "Failed to set shift:both_capslock"
          when: "'shift:both_capslock' not in updated_xkb_options.stdout"
